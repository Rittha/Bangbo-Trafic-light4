<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Bo Smart Traffic Control (Safety Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #007aff; --danger: #ff3b30; --success: #4cd964; --warning: #ffcc00; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        
        #emergencyBox { 
            background: var(--danger); color: white; padding: 15px; border-radius: 15px; 
            margin-bottom: 15px; display: none; text-align: center; font-weight: bold;
            animation: blink 0.6s infinite; border: 2px solid white;
        }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

        .light-box { background: #252525; width: 70px; padding: 15px; border-radius: 35px; margin: 15px auto; display: flex; flex-direction: column; gap: 12px; border: 4px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .bulb { width: 45px; height: 45px; border-radius: 50%; background: #111; opacity: 0.1; transition: 0.4s; }
        .red.active { background: var(--danger); opacity: 1; box-shadow: 0 0 35px var(--danger); }
        .yellow.active { background: var(--warning); opacity: 1; box-shadow: 0 0 35px var(--warning); }
        .green.active { background: var(--success); opacity: 1; box-shadow: 0 0 35px var(--success); }

        .card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #333; position: relative; overflow: hidden; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .mode-auto { background: #4cd96422; color: var(--success); border: 1px solid var(--success); }
        .mode-manual { background: #ff950022; color: #ff9500; border: 1px solid #ff9500; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-family: 'Kanit'; }
        button:active { transform: scale(0.95); }
        .btn-red { background: var(--danger); }
        .btn-green { background: var(--success); }
        .btn-yellow { background: var(--warning); color: black; }
        .btn-main { background: var(--primary); width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-emergency { background: white; color: var(--danger); border: 2px solid var(--danger); width: 100%; margin-top: 15px; }
        
        canvas { margin-top: 15px; max-height: 140px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #2a2a2a; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 11px; color: #888; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="emergencyBox">🚨 ตรวจพบรถฉุกเฉิน! เปิดทางด่วนอัตโนมัติ</div>

    <header style="text-align: center; margin: 10px 0 20px 0;">
        <h2 style="margin:0; letter-spacing: 1px;">BANG BO SMART TRAFFIC</h2>
        <small style="color:#666;">ระบบควบคุมแยกโรงเรียนชุมชนบางบ่อ</small>
    </header>

    <div class="card" style="text-align: center;">
        <div id="modeStatus" class="badge mode-auto">ระบบทำงานอัตโนมัติ (AI Active)</div>
        <div class="light-box">
            <div id="l-red" class="bulb red active"></div>
            <div id="l-yellow" class="bulb yellow"></div>
            <div id="l-green" class="bulb green"></div>
        </div>
        <h1 id="timer" style="margin:5px 0; font-size: 56px; font-weight: 700;">30s</h1>
        
        <div class="status-grid">
            <div class="stat-item">
                <span class="stat-label">รถสะสม (คัน)</span>
                <span id="carCount" class="stat-value">12</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ความหนาแน่น</span>
                <span id="density" class="stat-value" style="color:var(--success)">ปกติ</span>
            </div>
        </div>
    </div>

    <div class="card">
        <strong style="color:var(--primary)">ADMIN CONTROL PANEL</strong>
        <button id="modeToggle" class="btn-main">สลับเป็นโหมดควบคุมมือ (Manual)</button>
        
        <div id="manualUI" style="display:none;">
            <div class="btn-group">
                <button class="btn-red" onclick="manualChange('RED')">แดง</button>
                <button class="btn-yellow" onclick="manualChange('YELLOW')">เหลือง</button>
                <button class="btn-green" onclick="manualChange('GREEN')">เขียว</button>
            </div>
            <p style="font-size:11px; color:#666; text-align:center; margin-top:10px;">* ปรับไฟเหลือง 10 วินาทีก่อนแดงเพื่อความปลอดภัย</p>
        </div>

        <button class="btn-emergency" onclick="triggerEmergency()">จำลองเหตุการณ์: รถฉุกเฉินมา</button>
    </div>

    <div class="card">
        <strong style="font-size:14px;">การไหลเวียนจราจรย้อนหลัง</strong>
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<script>
    let isAuto = true;
    let state = 'RED';
    let timeLeft = 30;
    let isEmergency = false;
    let carHistory = [12, 18, 15, 22, 10, 14, 16];

    const ctx = document.getElementById('trafficChart').getContext('2d');
    const trafficChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['', '', '', '', '', '', ''],
            datasets: [{
                data: carHistory,
                borderColor: '#007aff',
                backgroundColor: 'rgba(0,122,255,0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: { plugins: { legend: false }, scales: { y: { display: false }, x: { display: false } } }
    });

    setInterval(() => {
        if (isEmergency) return;

        if (isAuto) {
            timeLeft--;
            if (timeLeft <= 0) {
                if (state === 'RED') {
                    // แดง -> เขียว
                    state = 'GREEN';
                    let currentCars = parseInt(document.getElementById('carCount').innerText);
                    timeLeft = Math.min(60, Math.max(20, currentCars * 2));
                } else if (state === 'GREEN') {
                    // เขียว -> เหลือง (10 วินาที)
                    state = 'YELLOW';
                    timeLeft = 10;
                } else if (state === 'YELLOW') {
                    // เหลือง -> แดง
                    state = 'RED';
                    timeLeft = 30;
                }
            }
        }
        updateDisplay();
        simulateTrafficData();
    }, 1000);

    function updateDisplay() {
        document.querySelectorAll('.bulb').forEach(b => b.classList.remove('active'));
        document.getElementById('l-' + state.toLowerCase()).classList.add('active');
        
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('modeStatus').className = isAuto ? "badge mode-auto" : "badge mode-manual";
        document.getElementById('modeStatus').innerText = isAuto ? "ระบบทำงานอัตโนมัติ (AI Active)" : "โหมดควบคุมมือ (Manual Mode)";
        document.getElementById('manualUI').style.display = isAuto ? "none" : "block";
        document.getElementById('modeToggle').innerText = isAuto ? "สลับเป็นโหมดควบคุมมือ (Manual)" : "กลับไปใช้โหมดอัตโนมัติ";
    }

    document.getElementById('modeToggle').onclick = () => {
        isAuto = !isAuto;
        updateDisplay();
    };

    function manualChange(newState) {
        state = newState;
        if (newState === 'GREEN') timeLeft = 45;
        else if (newState === 'YELLOW') timeLeft = 10;
        else timeLeft = 30;
        updateDisplay();
    }

    function triggerEmergency() {
        if (isEmergency) return;
        isEmergency = true;
        
        document.getElementById('emergencyBox').style.display = 'block';
        state = 'GREEN'; 
        timeLeft = 99;
        updateDisplay();

        setTimeout(() => {
            // ก่อนจะกลับไปแดง ให้ผ่านไฟเหลืองก่อนเพื่อความปลอดภัย
            state = 'YELLOW';
            timeLeft = 5;
            updateDisplay();
            
            setTimeout(() => {
                isEmergency = false;
                document.getElementById('emergencyBox').style.display = 'none';
                state = 'RED';
                timeLeft = 15;
                updateDisplay();
            }, 5000);
        }, 8000);
    }

    function simulateTrafficData() {
        let cars = Math.floor(Math.random() * 35);
        document.getElementById('carCount').innerText = cars;
        
        let density = document.getElementById('density');
        if (cars > 25) { density.innerText = "หนาแน่น"; density.style.color = "var(--danger)"; }
        else if (cars > 15) { density.innerText = "ปานกลาง"; density.style.color = "var(--warning)"; }
        else { density.innerText = "ปกติ"; density.style.color = "var(--success)"; }

        carHistory.shift();
        carHistory.push(cars);
        trafficChart.update();
    }
</script>
</body>
</html>
