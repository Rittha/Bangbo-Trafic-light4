<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Bo Smart Traffic Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #007aff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        
        /* Traffic Light Visual */
        .light-box { background: #333; width: 80px; padding: 15px; border-radius: 40px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; border: 4px solid #444; }
        .bulb { width: 50px; height: 50px; border-radius: 50%; background: #222; opacity: 0.2; transition: 0.3s; }
        .red.active { background: #ff3b30; opacity: 1; box-shadow: 0 0 30px #ff3b30; }
        .yellow.active { background: #ffcc00; opacity: 1; box-shadow: 0 0 30px #ffcc00; }
        .green.active { background: #4cd964; opacity: 1; box-shadow: 0 0 30px #4cd964; }

        /* Status & Admin Panel */
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .badge { padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .mode-auto { background: #4cd96422; color: #4cd964; border: 1px solid #4cd964; }
        .mode-manual { background: #ff950022; color: #ff9500; border: 1px solid #ff9500; }
        
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-red { background: #ff3b30; }
        .btn-green { background: #4cd964; }
        .btn-auto { background: var(--primary); width: 100%; margin-top: 10px; }
        .btn-auto.off { background: #555; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        canvas { margin-top: 20px; max-height: 150px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin:0;">🚦 ระบบจัดการจราจรบางบ่อ</h2>
        <small style="color:#888;">Smart City Project สำหรับชุมชน</small>
    </div>

    <div class="card" style="text-align: center;">
        <span id="modeBadge" class="badge mode-auto">ระบบอัตโนมัติ (AI)</span>
        <div class="light-box">
            <div id="light-red" class="bulb red active"></div>
            <div id="light-yellow" class="bulb yellow"></div>
            <div id="light-green" class="bulb green"></div>
        </div>
        <h1 id="timerDisplay" style="margin:0; font-size: 48px;">30s</h1>
        <p id="statusText" style="color:#aaa;">ตรวจพบรถสะสม: <span id="carCount">12</span> คัน</p>
    </div>

    <div class="card">
        <strong style="display:block; margin-bottom:10px;">🛠 แผงควบคุมแอดมิน</strong>
        <button id="toggleAuto" class="btn-auto">สลับเป็นโหมด Manual</button>
        
        <div id="manualControls" class="btn-group" style="display:none;">
            <button class="btn-red" onclick="setManual('RED')">บังคับไฟแดง</button>
            <button class="btn-green" onclick="setManual('GREEN')">ปล่อยไฟเขียว</button>
        </div>
    </div>

    <div class="card">
        <strong style="display:block; margin-bottom:5px;">สถิติการจราจร Real-time</strong>
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<script>
    // System State
    let isAuto = true;
    let state = 'RED';
    let timer = 30;
    let carData = [10, 15, 8, 12, 25, 18, 20];

    // Chart.js Setup
    const ctx = document.getElementById('trafficChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['', '', '', '', '', '', ''],
            datasets: [{ label: 'จำนวนรถสะสม', data: carData, borderColor: '#007aff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,122,255,0.1)' }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
    });

    // Main Logic Loop (Run Every 1s)
    setInterval(() => {
        if (isAuto) {
            timer--;
            if (timer <= 0) {
                state = (state === 'RED') ? 'GREEN' : 'RED';
                timer = (state === 'GREEN') ? 45 : 30; // ปรับเวลาอัตโนมัติ
            }
        }
        updateUI();
        simulateTraffic();
    }, 1000);

    function updateUI() {
        // Update Lights
        document.querySelectorAll('.bulb').forEach(b => b.classList.remove('active'));
        document.getElementById('light-' + state.toLowerCase()).classList.add('active');
        
        // Update Text
        document.getElementById('timerDisplay').innerText = timer + "s";
        document.getElementById('modeBadge').innerText = isAuto ? "ระบบอัตโนมัติ (AI)" : "โหมดควบคุมมือ (Manual)";
        document.getElementById('modeBadge').className = isAuto ? "badge mode-auto" : "badge mode-manual";
        document.getElementById('manualControls').style.display = isAuto ? "none" : "flex";
        document.getElementById('toggleAuto').innerText = isAuto ? "สลับเป็นโหมด Manual" : "กลับไปใช้โหมดอัตโนมัติ";
    }

    function setManual(newState) {
        state = newState;
        timer = (newState === 'GREEN') ? 60 : 30;
        updateUI();
    }

    document.getElementById('toggleAuto').onclick = () => { isAuto = !isAuto; updateUI(); };

    function simulateTraffic() {
        const newCount = Math.floor(Math.random() * 40);
        document.getElementById('carCount').innerText = newCount;
        carData.shift();
        carData.push(newCount);
        chart.update();
    }
</script>
</body>
</html>
